<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>출석체크 - BENEFIT HUB</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #f5f5f5;
    max-width: 393px;
    margin: 0 auto;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 16px; background: #fff;
    font-size: 14px; font-weight: 600;
  }

  .header {
    background: #fff; padding: 10px 12px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid #eee;
  }
  .header-back {
    text-decoration: none; color: #000;
    display: flex; align-items: center;
  }
  .header-title {
    font-size: 15px; font-weight: 700; color: #000;
    position: absolute; left: 50%; transform: translateX(-50%);
  }
  .header-right { width: 22px; }

  .content { background: #fff; padding: 20px 16px 0; }

  .page-title-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .page-title { font-size: 22px; font-weight: 900; color: #000; }
  .page-info {
    width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid #ccc;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #999; cursor: pointer;
  }

  /* 7-Day Progress */
  .week-card {
    background: #f8f8fa; border-radius: 12px;
    padding: 16px; margin-bottom: 20px;
  }
  .week-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .week-label { font-size: 14px; font-weight: 800; color: #000; }
  .week-count { font-size: 12px; color: #999; }
  .week-days {
    display: flex; justify-content: space-between; gap: 4px;
  }
  .day-slot {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }
  .day-circle {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    background: #e8e8e8; color: #bbb;
    transition: all 0.3s;
    position: relative;
  }
  .day-circle.done {
    background: #000; color: #fff;
  }
  .day-circle.today {
    border: 2.5px solid #000;
    background: #fff; color: #000;
  }
  .day-circle.today.done {
    background: #000; color: #fff;
    border-color: #000;
  }
  .day-circle.bonus {
    background: #fff3e0; color: #ff9800;
    border: 2px dashed #ffb74d;
  }
  .day-circle.bonus.done {
    background: #ff9800; color: #fff;
    border: 2px solid #ff9800;
  }
  .day-name {
    font-size: 11px; color: #999; font-weight: 600;
  }
  .day-name.today { color: #000; font-weight: 800; }
  .day-reward {
    font-size: 9px; color: #999; font-weight: 600;
    margin-top: -2px;
  }
  .day-reward.bonus { color: #ff9800; font-weight: 800; }

  /* Stamp Area */
  .stamp-area {
    display: flex; flex-direction: column;
    align-items: center; padding: 24px 0 28px;
    position: relative;
  }
  .stamp-icon {
    font-size: 80px; margin-bottom: 20px;
    transition: transform 0.3s;
  }
  .stamp-btn {
    width: 100%; max-width: 280px;
    padding: 15px 0; border: none; border-radius: 8px;
    background: #000; color: #fff;
    font-size: 16px; font-weight: 800;
    cursor: pointer; transition: all 0.2s;
  }
  .stamp-btn:active { transform: scale(0.97); }
  .stamp-btn.done {
    background: #e0e0e0; color: #999; cursor: default;
  }
  .stamp-sub {
    font-size: 12px; color: #999; margin-top: 10px;
  }

  /* Streak */
  .streak-row {
    display: flex; gap: 8px; margin-bottom: 16px;
  }
  .streak-card {
    flex: 1; background: #f8f8fa; border-radius: 10px;
    padding: 14px; text-align: center;
  }
  .streak-label { font-size: 11px; color: #999; margin-bottom: 4px; }
  .streak-value { font-size: 22px; font-weight: 900; color: #000; }
  .streak-unit { font-size: 12px; font-weight: 500; color: #666; }

  .divider { height: 6px; background: #f0f0f0; }

  /* Rewards */
  .rewards-section { background: #fff; padding: 16px; }
  .rewards-title { font-size: 15px; font-weight: 800; color: #000; margin-bottom: 12px; }
  .reward-row {
    display: flex; align-items: center;
    padding: 10px 0; border-bottom: 1px solid #f5f5f5;
  }
  .reward-row:last-child { border-bottom: none; }
  .reward-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: #f0f0f0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; margin-right: 10px; flex-shrink: 0;
  }
  .reward-info { flex: 1; }
  .reward-name { font-size: 13px; font-weight: 700; color: #000; }
  .reward-desc { font-size: 11px; color: #999; margin-top: 1px; }
  .reward-point { font-size: 14px; font-weight: 800; color: #ff4444; flex-shrink: 0; }

  .promo-banner {
    margin: 12px 16px; border-radius: 10px;
    overflow: hidden; cursor: pointer;
  }
  .promo-inner {
    background: linear-gradient(135deg, #1a1a2e, #0f3460);
    padding: 16px 18px; color: #fff;
  }
  .promo-tag {
    display: inline-block; font-size: 10px; font-weight: 700;
    background: #ffe500; color: #000;
    padding: 2px 8px; border-radius: 8px; margin-bottom: 6px;
  }
  .promo-title { font-size: 15px; font-weight: 800; line-height: 1.4; }
  .promo-sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }

  .bottom-spacer { height: 20px; }

  /* Animations */
  @keyframes stampBounce {
    0% { transform: scale(1); }
    30% { transform: scale(1.3) rotate(-8deg); }
    50% { transform: scale(0.9) rotate(4deg); }
    70% { transform: scale(1.1) rotate(-2deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  .stamp-icon.animate { animation: stampBounce 0.6s ease; }
  .confetti-piece {
    position: absolute;
    width: 6px; height: 6px; border-radius: 50%;
    animation: confettiFly 0.8s ease-out forwards;
  }
  @keyframes confettiFly {
    0% { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
  }
  @keyframes dayPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.25); }
    100% { transform: scale(1); }
  }
  .day-circle.pop { animation: dayPop 0.4s ease; }
</style>
</head>
<body>

<div class="status-bar">
  <span style="font-weight:700;">10:08</span>
  <div style="display:flex;gap:4px;align-items:center;font-size:12px;">
    <span>LTE</span><span>&#9632;</span>
  </div>
</div>

<div class="header">
  <a class="header-back" href="index.html">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
  </a>
  <div class="header-title">출석체크</div>
  <div class="header-right"></div>
</div>

<div class="content">
  <div class="page-title-row">
    <div class="page-title">오늘의 출석체크</div>
    <div class="page-info">i</div>
  </div>

  <!-- 7-Day Progress -->
  <div class="week-card">
    <div class="week-header">
      <span class="week-label">이번 주 출석현황</span>
      <span class="week-count" id="weekCount">2 / 7</span>
    </div>
    <div class="week-days" id="weekDays">
      <div class="day-slot">
        <div class="day-circle done">&#10003;</div>
        <div class="day-name">월</div>
        <div class="day-reward">+5P</div>
      </div>
      <div class="day-slot">
        <div class="day-circle done">&#10003;</div>
        <div class="day-name">화</div>
        <div class="day-reward">+5P</div>
      </div>
      <div class="day-slot">
        <div class="day-circle today" id="todayCircle">3</div>
        <div class="day-name today">수</div>
        <div class="day-reward">+5P</div>
      </div>
      <div class="day-slot">
        <div class="day-circle">4</div>
        <div class="day-name">목</div>
        <div class="day-reward">+5P</div>
      </div>
      <div class="day-slot">
        <div class="day-circle">5</div>
        <div class="day-name">금</div>
        <div class="day-reward">+5P</div>
      </div>
      <div class="day-slot">
        <div class="day-circle">6</div>
        <div class="day-name">토</div>
        <div class="day-reward">+5P</div>
      </div>
      <div class="day-slot">
        <div class="day-circle bonus">&#127873;</div>
        <div class="day-name">일</div>
        <div class="day-reward bonus">+50P</div>
      </div>
    </div>
  </div>

  <!-- Stamp -->
  <div class="stamp-area">
    <div class="stamp-icon" id="stampIcon">&#128197;</div>
    <button class="stamp-btn" id="stampBtn" onclick="doStamp()">출석 도장 찍기</button>
    <div class="stamp-sub" id="stampSub">매일 한번 출석할 수 있어요</div>
  </div>

  <!-- Streak -->
  <div class="streak-row">
    <div class="streak-card">
      <div class="streak-label">연속 출석</div>
      <div>
        <span class="streak-value" id="streakValue">2</span>
        <span class="streak-unit">일째</span>
      </div>
    </div>
    <div class="streak-card">
      <div class="streak-label">누적 포인트</div>
      <div>
        <span class="streak-value" id="totalPoint">10</span>
        <span class="streak-unit">P</span>
      </div>
    </div>
  </div>
</div>

<div class="divider"></div>

<!-- Rewards -->
<div class="rewards-section">
  <div class="rewards-title">출석 보상 안내</div>
  <div class="reward-row">
    <div class="reward-icon">&#128197;</div>
    <div class="reward-info">
      <div class="reward-name">매일 출석</div>
      <div class="reward-desc">하루 1회 출석 시</div>
    </div>
    <div class="reward-point">+5P</div>
  </div>
  <div class="reward-row">
    <div class="reward-icon">&#127873;</div>
    <div class="reward-info">
      <div class="reward-name">7일 연속 출석 보너스</div>
      <div class="reward-desc">일주일 개근 달성 시</div>
    </div>
    <div class="reward-point">+50P</div>
  </div>
  <div class="reward-row">
    <div class="reward-icon">&#128293;</div>
    <div class="reward-info">
      <div class="reward-name">연속 출석 유지</div>
      <div class="reward-desc">매주 반복하면 보너스 UP</div>
    </div>
    <div class="reward-point">+100P</div>
  </div>
</div>

<div class="divider"></div>

<!-- Promo Banner -->
<div class="promo-banner" onclick="location.href='index.html'">
  <div class="promo-inner">
    <div class="promo-tag">BENEFIT HUB</div>
    <div class="promo-title">출석 말고 더 많은 혜택이?<br>지금 확인하기</div>
    <div class="promo-sub">포인트 적립 / 미션 / 이벤트 모아보기</div>
  </div>
</div>

<div class="bottom-spacer"></div>

<script>
  let stamped = false;

  function doStamp() {
    if (stamped) return;
    stamped = true;

    const icon = document.getElementById('stampIcon');
    const btn = document.getElementById('stampBtn');
    const sub = document.getElementById('stampSub');
    const streak = document.getElementById('streakValue');
    const total = document.getElementById('totalPoint');
    const todayCircle = document.getElementById('todayCircle');
    const weekCount = document.getElementById('weekCount');

    // Animate stamp icon
    icon.classList.add('animate');
    icon.innerHTML = '&#9989;';

    // Confetti
    createConfetti();

    // Update today circle
    todayCircle.classList.add('done', 'pop');
    todayCircle.innerHTML = '&#10003;';

    // Update button
    btn.textContent = '출석 완료!';
    btn.classList.add('done');
    sub.textContent = '+5P 적립되었어요';
    sub.style.color = '#000';
    sub.style.fontWeight = '700';

    // Update stats
    streak.textContent = '3';
    total.textContent = '15';
    weekCount.textContent = '3 / 7';

    setTimeout(() => {
      icon.classList.remove('animate');
      todayCircle.classList.remove('pop');
    }, 600);
  }

  function createConfetti() {
    const area = document.querySelector('.stamp-area');
    const colors = ['#000', '#ff4444', '#ffe500', '#4caf50', '#2196f3'];
    for (let i = 0; i < 12; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const angle = (i / 12) * Math.PI * 2;
      const dist = 40 + Math.random() * 30;
      piece.style.cssText = `
        left: 50%; top: 35%;
        background: ${colors[i % colors.length]};
        --tx: ${Math.cos(angle) * dist}px;
        --ty: ${Math.sin(angle) * dist}px;
      `;
      area.appendChild(piece);
      setTimeout(() => piece.remove(), 800);
    }
  }
</script>

</body>
</html>
